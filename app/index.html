<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PAGE SETTINGS -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PAGE TITLE -->
  <title>Fontana Fire FC Attendance App</title>

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-shell">

    <!-- TOP HEADER / BRANDING -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">&#128293;</div>
        <div>
          <h1>Fontana Fire FC</h1>
          <p>Coach Attendance App</p>
        </div>
      </div>
    </header>

    <!-- MAIN APP AREA -->
    <main class="container">

      <!-- LOGIN SCREEN -->
      <section id="loginScreen" class="card">
        <h2>Login</h2>

        <!-- EMAIL INPUT -->
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Email" />
        </div>

        <!-- PASSWORD INPUT -->
        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" />
        </div>

        <!-- LOGIN BUTTON / MESSAGE -->
        <button id="loginBtn" class="btn btn-primary">Login</button>
        <p id="loginMessage" class="message"></p>
      </section>

      <!-- LOGGED-IN APP SCREEN -->
      <section id="appScreen" class="card hidden">

        <!-- USER WELCOME INFO -->
        <h2 id="welcomeText">Welcome</h2>
        <p id="roleText" class="subtext"></p>

        <!-- GROUP FILTER -->
        <div class="form-row">
          <label for="groupSelect">Group</label>
          <select id="groupSelect">
            <option value="">All Groups</option>
          </select>
        </div>

        <!-- PRACTICE / GAME TABS -->
        <div class="tabs">
          <button id="practiceTab" class="tab active">Practice</button>
          <button id="gamesTab" class="tab">Games</button>
        </div>

        <!-- EVENT SELECTOR -->
        <div class="form-row">
          <label for="eventSelect">Event</label>
          <select id="eventSelect">
            <option value="">Select event</option>
          </select>

          <!-- CANCEL EVENT BUTTON
               Shows only when a Scheduled event is selected.
               Controlled by app.js updateEventActionButtons().
          -->
          <button id="cancelEventBtn" type="button" class="btn btn-danger hidden">
            Cancel Event
          </button>

          <!-- RESTORE EVENT BUTTON
               Shows only when a Cancelled event is selected.
               Controlled by app.js updateEventActionButtons().
          -->
          <button id="restoreEventBtn" type="button" class="btn btn-secondary hidden">
            Restore Event
          </button>
        </div>

        <!-- PLAYER ATTENDANCE LIST -->
        <div class="form-row">
          <h3>Players</h3>

          <!-- ATTENDANCE SUMMARY / HIDE COMPLETED TOOLS -->
          <div class="attendance-tools">
            <div id="attendanceSummary" class="attendance-summary">
              Present: 0 | Absent: 0 | Excused: 0 | Cancelled: 0 | Remaining: 0
            </div>

            <label class="hide-marked-toggle">
              <input type="checkbox" id="hideMarkedToggle" checked />
              Hide marked players
            </label>

            <button id="showCompletedBtn" type="button" class="btn btn-secondary">
              Show Completed Attendance (0)
            </button>
          </div>

          <!-- PLAYERS STILL NEEDING ATTENDANCE -->
          <div id="playerList"></div>

          <!-- COMPLETED / MARKED PLAYERS -->
          <div id="completedPlayerList" class="completed-player-list hidden"></div>
        </div>

        <!-- SUBMIT ATTENDANCE -->
        <button id="saveAttendanceBtn" class="btn btn-primary">
          Submit Attendance
        </button>
        <p id="attendanceMessage" class="message"></p>

        <hr />

       <!-- ADD PLAYER SECTION -->
<div id="addPlayerSection" class="form-row">
  <h3>Add Player</h3>

  <input id="newFirstName" type="text" placeholder="First name" />
  <input id="newLastName" type="text" placeholder="Last name" />

  <select id="newBirthYear">
    <option value="">Select birth year</option>
    <option value="2012">2012</option>
    <option value="2013">2013</option>
    <option value="2014">2014</option>
    <option value="2015">2015</option>
    <option value="2016">2016</option>
    <option value="2017">2017</option>
    <option value="2018">2018</option>
    <option value="2019">2019</option>
    <option value="2020">2020</option>
    <option value="2021">2021</option>
  </select>

  <button id="addPlayerBtn" class="btn btn-primary">
    Add Player
  </button>

  <p id="addPlayerMessage" class="message"></p>
</div>

        <!-- APP VERSION -->
        <div class="app-version">
          Fontana Fire FC Attendance App v0.6.0-test
        </div>

        <!-- LOGOUT BUTTON -->
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </section>
    </main>
  </div>

  <!-- JAVASCRIPT FILE -->
  <script src="app.js?v=9"></script>
</body>
</html>
