<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fontana Fire FC Attendance App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🔥</div>
        <div>
          <h1>Fontana Fire FC</h1>
          <p>Coach Attendance App</p>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="loginScreen" class="card">
        <h2>Login</h2>

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Email" />
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" />
        </div>

        <button id="loginBtn" class="btn btn-primary">Login</button>
        <p id="loginMessage" class="message"></p>
      </section>

      <section id="appScreen" class="card hidden">
        <h2 id="welcomeText">Welcome</h2>
        <p id="roleText" class="subtext"></p>

        <div class="form-row">
          <label for="groupSelect">Group</label>
          <select id="groupSelect">
            <option value="">All Groups</option>
          </select>
        </div>

        <div class="form-row">
          <label for="eventSelect">Event</label>
          <select id="eventSelect">
            <option value="">Select event</option>
          </select>
        </div>

        <div class="form-row">
          <h3>Players</h3>
          <div id="playerList"></div>
        </div>

        <button id="saveAttendanceBtn" class="btn btn-primary">Submit Attendance</button>
        <p id="attendanceMessage" class="message"></p>

        <hr />

        <div class="form-row">
          <h3>Add Player</h3>
          <input id="newFirstName" type="text" placeholder="First name" />
          <input id="newLastName" type="text" placeholder="Last name" />
          <button id="addPlayerBtn" class="btn btn-primary">Add Player</button>
          <p id="addPlayerMessage" class="message"></p>
        </div>

        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
